<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Selfie Gallery | NBC Red Auditors</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --red:    #e60012;
      --red-dk: #b8000e;
      --bg:     #f0f0f2;
      --card:   #ffffff;
      --text:   #111;
      --muted:  #6b6b6b;
      --border: #e0e0e0;
      --green:  #00a651;
      --amber:  #f5a623;
      --blue:   #0057ff;
      --shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      background: var(--red);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(230,0,18,.3);
    }
    .topbar-brand { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: #fff; }
    .btn-logout {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff; padding: 6px 14px;
      border-radius: 7px; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.28); }

    /* MAIN */
    .main { max-width: 1280px; margin: 0 auto; padding: 30px 20px 70px; }

    /* FILTER BAR */
    .filter-bar {
      background: var(--card);
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .filter-group input,
    .filter-group select {
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      color: var(--text);
      background: #fafafa;
      transition: border-color .2s;
    }
    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--red);
      background: #fff;
    }

    .btn-filter {
      padding: 10px 22px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .88rem;
      cursor: pointer;
      transition: background .2s;
      align-self: flex-end;
    }
    .btn-filter:hover { background: var(--red-dk); }

    /* STAT STRIP */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }
    .meta-count {
      font-size: .88rem;
      color: var(--muted);
    }
    .meta-count strong { color: var(--text); }

    /* GRID */
    .selfie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .selfie-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .selfie-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,.13);
    }

    /* IMAGE WRAPPER with watermark */
    .img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #111;
      overflow: hidden;
    }
    .img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .selfie-card:hover .img-wrap img { transform: scale(1.04); }

    /* TIMESTAMP WATERMARK overlay */
    .watermark {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.72));
      padding: 30px 12px 10px;
      pointer-events: none;
    }
    .wm-time {
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: .5px;
    }
    .wm-date {
      font-size: .72rem;
      color: rgba(255,255,255,.75);
      margin-top: 2px;
    }
    .wm-badge {
      position: absolute;
      top: 10px; right: 10px;
      font-size: .7rem;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 20px;
      letter-spacing: .4px;
    }
    .wm-present  { background: rgba(0,166,81,.85);  color: #fff; }
    .wm-absent   { background: rgba(230,0,18,.85);  color: #fff; }
    .wm-late     { background: rgba(245,166,35,.9); color: #111; }
    .wm-permission { background: rgba(0,87,255,.8); color: #fff; }

    /* CARD INFO */
    .selfie-info {
      padding: 13px 14px 15px;
    }
    .info-name {
      font-weight: 700;
      font-size: .92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .info-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .info-office {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* EMPTY / LOADING */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .state-box i { font-size: 2.5rem; margin-bottom: 12px; display: block; }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 36px;
      flex-wrap: wrap;
    }
    .page-btn {
      width: 38px; height: 38px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--red); color: var(--red); }
    .page-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .lightbox.open { display: flex; }
    .lb-inner {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: lbIn .25s ease;
    }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(.93); }
      to   { opacity: 1; transform: scale(1); }
    }
    .lb-img-wrap { position: relative; }
    .lb-img-wrap img { width: 100%; display: block; max-height: 420px; object-fit: cover; }
    .lb-watermark {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.8));
      padding: 40px 18px 14px;
    }
    .lb-time { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; }
    .lb-date { font-size: .82rem; color: rgba(255,255,255,.75); margin-top: 3px; }
    .lb-info { padding: 18px 20px 22px; }
    .lb-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
    .lb-meta { font-size: .85rem; color: var(--muted); line-height: 1.6; }
    .lb-close {
      position: absolute;
      top: 12px; right: 14px;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      z-index: 2;
    }
    .lb-close:hover { background: rgba(255,255,255,.3); }

    /* NAV BACK */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--red);
      font-weight: 600;
      font-size: .88rem;
      text-decoration: none;
      margin-bottom: 22px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav class="topbar">
  <span class="topbar-brand"><i class="bi bi-shield-fill-check me-2"></i>NBC Red Auditors — Admin</span>
  <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
</nav>

<div class="main">

  <a class="back-link" href="/admin-dashboard.html">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
  </a>

  <h1 style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:6px;">
    <i class="bi bi-camera-fill" style="color:var(--red);"></i> Check-In Selfie Gallery
  </h1>
  <p style="font-size:.88rem;color:var(--muted);margin-bottom:24px;">
    All staff selfies captured at check-in, shown with timestamp watermarks.
  </p>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Filter by Date</label>
      <input type="date" id="filter-date"/>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filter-status">
        <option value="">All Statuses</option>
        <option value="Present">Present</option>
        <option value="Late">Late</option>
        <option value="Absent">Absent</option>
        <option value="Permission">Permission</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Records per page</label>
      <select id="filter-limit">
        <option value="12">12</option>
        <option value="24" selected>24</option>
        <option value="48">48</option>
      </select>
    </div>
    <button class="btn-filter" onclick="applyFilter()">
      <i class="bi bi-funnel-fill"></i> Apply
    </button>
    <button class="btn-filter" style="background:#555;" onclick="clearFilter()">
      <i class="bi bi-x-circle"></i> Clear
    </button>
  </div>

  <!-- META -->
  <div class="meta-row">
    <p class="meta-count" id="meta-text">Loading…</p>
    <button class="btn-filter" onclick="loadSelfies(currentPage)" style="padding:8px 16px;font-size:.82rem;">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
  </div>

  <!-- GRID -->
  <div class="selfie-grid" id="selfie-grid">
    <div class="state-box"><i class="bi bi-hourglass-split"></i>Loading selfies…</div>
  </div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination"></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner" id="lb-inner">
    <div class="lb-img-wrap">
      <button class="lb-close" onclick="closeLightbox()"><i class="bi bi-x-lg"></i></button>
      <img id="lb-img" src="" alt="Selfie"/>
      <div class="lb-watermark">
        <div class="lb-time" id="lb-time"></div>
        <div class="lb-date" id="lb-date"></div>
      </div>
    </div>
    <div class="lb-info">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-meta" id="lb-meta"></div>
    </div>
  </div>
</div>

<script>
const BASE    = 'https://nbc-boa-attendance-system.onrender.com';
const token   = localStorage.getItem('adminToken') || localStorage.getItem('token');
const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

let currentPage  = 1;
let totalPages   = 1;
let totalRecords = 0;

// ── Load Selfies ──
async function loadSelfies(page = 1) {
  currentPage = page;
  const grid = document.getElementById('selfie-grid');
  grid.innerHTML = '<div class="state-box"><i class="bi bi-hourglass-split"></i>Loading…</div>';

  const date   = document.getElementById('filter-date').value;
  const status = document.getElementById('filter-status').value;
  const limit  = document.getElementById('filter-limit').value;

  let url = `${BASE}/api/attendance/admin/selfies?page=${page}&limit=${limit}`;
  if (date)   url += `&date=${date}`;

  try {
    const res  = await fetch(url, { headers });
    const data = await res.json();

    if (!res.ok) {
      grid.innerHTML = `<div class="state-box"><i class="bi bi-exclamation-triangle-fill" style="color:var(--red)"></i>${data.message || 'Error loading selfies.'}</div>`;
      return;
    }

    totalPages   = data.totalPages   || 1;
    totalRecords = data.totalRecords || 0;

    // Client-side status filter (since backend doesn't filter by status here)
    let records = data.records || [];
    if (status) records = records.filter(r => r.status === status);

    document.getElementById('meta-text').innerHTML =
      `Showing <strong>${records.length}</strong> of <strong>${totalRecords}</strong> selfie records`;

    renderGrid(records);
    renderPagination();

  } catch (err) {
    grid.innerHTML = `<div class="state-box"><i class="bi bi-wifi-off"></i>Network error. Check connection.</div>`;
  }
}

function renderGrid(records) {
  const grid = document.getElementById('selfie-grid');
  grid.innerHTML = '';

  if (!records.length) {
    grid.innerHTML = '<div class="state-box"><i class="bi bi-camera-slash-fill"></i>No selfies found for this filter.</div>';
    return;
  }

  records.forEach(r => {
    const checkInDate = new Date(r.checkIn);
    const timeStr = checkInDate.toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    const dateStr = checkInDate.toLocaleDateString('en-NG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

    const badgeClass = {
      Present:    'wm-present',
      Absent:     'wm-absent',
      Late:       'wm-late',
      Permission: 'wm-permission'
    }[r.status] || '';

    const card = document.createElement('div');
    card.className = 'selfie-card';
    card.onclick = () => openLightbox(r);

    const imgSrc = r.selfie || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQwIiBoZWlnaHQ9IjMyMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjQwIiBoZWlnaHQ9IjMyMCIgZmlsbD0iIzIyMiIvPjx0ZXh0IHg9IjEyMCIgeT0iMTcwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjNTU1IiBmb250LXNpemU9IjE0Ij5ObyBJbWFnZTwvdGV4dD48L3N2Zz4=';

    card.innerHTML = `
      <div class="img-wrap">
        <img src="${imgSrc}" alt="Selfie of ${r.staffName}" loading="lazy"/>
        <div class="watermark">
          <div class="wm-time">${timeStr}</div>
          <div class="wm-date">${dateStr}</div>
        </div>
        ${r.status ? `<span class="wm-badge ${badgeClass}">${r.status}</span>` : ''}
      </div>
      <div class="selfie-info">
        <div class="info-name">${r.staffName}</div>
        <div class="info-meta">${r.staffEmail}</div>
        <div class="info-office"><i class="bi bi-building"></i>${r.officeName || 'Unknown'}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderPagination() {
  const wrap = document.getElementById('pagination');
  wrap.innerHTML = '';
  if (totalPages <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.innerHTML = '<i class="bi bi-chevron-left"></i>';
  prev.disabled  = currentPage <= 1;
  prev.onclick   = () => loadSelfies(currentPage - 1);
  wrap.appendChild(prev);

  // Show up to 7 page buttons
  let start = Math.max(1, currentPage - 3);
  let end   = Math.min(totalPages, start + 6);
  start = Math.max(1, end - 6);

  for (let i = start; i <= end; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => loadSelfies(i);
    wrap.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.innerHTML = '<i class="bi bi-chevron-right"></i>';
  next.disabled  = currentPage >= totalPages;
  next.onclick   = () => loadSelfies(currentPage + 1);
  wrap.appendChild(next);
}

// ── Filter ──
function applyFilter() { loadSelfies(1); }
function clearFilter() {
  document.getElementById('filter-date').value   = '';
  document.getElementById('filter-status').value = '';
  loadSelfies(1);
}

// ── Lightbox ──
function openLightbox(r) {
  const checkInDate = new Date(r.checkIn);
  const timeStr = checkInDate.toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
  const dateStr = checkInDate.toLocaleDateString('en-NG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const checkOutStr = r.checkOut
    ? new Date(r.checkOut).toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit', hour12: true })
    : 'Not checked out';

  document.getElementById('lb-img').src   = r.selfie || '';
  document.getElementById('lb-time').textContent = timeStr;
  document.getElementById('lb-date').textContent = dateStr;
  document.getElementById('lb-name').textContent = r.staffName;
  document.getElementById('lb-meta').innerHTML = `
    <b>Email:</b> ${r.staffEmail}<br/>
    <b>Office:</b> ${r.officeName || 'Unknown'}<br/>
    <b>Location:</b> ${r.locationStatus || '—'}<br/>
    <b>Check-In:</b> ${timeStr}<br/>
    <b>Check-Out:</b> ${checkOutStr}<br/>
    <b>Status:</b> ${r.status || '—'}
  `;

  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.closest('.lb-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// Keyboard ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
});

function logout() {
  localStorage.clear();
  window.location.href = '/admin-login';
}

// ── Init ──
// Pre-set today's date in the filter
document.getElementById('filter-date').value = new Date().toISOString().slice(0, 10);
loadSelfies(1);
</script>
</body>
</html>
