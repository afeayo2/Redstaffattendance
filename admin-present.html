<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Attendance | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --red: #e60012; --red-dk: #b8000e;
      --green: #00a651; --amber: #f5a623; --blue: #0057ff;
    }
    body { font-family:'DM Sans',sans-serif; background:#f5f5f7; padding:0; margin:0; }

    .topbar {
      background: var(--red); padding: 0 28px; height: 58px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 12px rgba(230,0,18,.3);
    }
    .topbar-brand { font-family:'Syne',sans-serif; color:#fff; font-size:1.1rem; font-weight:800; }
    .btn-logout {
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3);
      color:#fff; padding:6px 14px; border-radius:7px;
      font-size:.82rem; font-weight:600; cursor:pointer;
    }
    .btn-logout:hover { background:rgba(255,255,255,.28); }

    .main { max-width:1280px; margin:0 auto; padding:28px 20px 60px; }
    .page-title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:22px; }
    .page-title i { color:var(--red); }

    /* filter bar */
    .filter-bar {
      background:#fff; border-radius:16px; padding:18px 22px;
      box-shadow:0 2px 14px rgba(0,0,0,.06); margin-bottom:22px;
      display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;
    }
    .fg { display:flex; flex-direction:column; gap:4px; }
    .fg label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#888; }
    .fg select, .fg input {
      padding:8px 12px; border:1.5px solid #e0e0e0; border-radius:9px;
      font-family:'DM Sans',sans-serif; font-size:.88rem; background:#fafafa;
    }
    .fg select:focus,.fg input:focus { outline:none; border-color:var(--red); background:#fff; }

    .btn-filter {
      padding:9px 20px; border:none; border-radius:9px;
      font-family:'DM Sans',sans-serif; font-weight:700; font-size:.85rem;
      cursor:pointer; transition:all .18s; align-self:flex-end;
    }
    .bf-red   { background:var(--red); color:#fff; }
    .bf-red:hover { background:var(--red-dk); }
    .bf-gray  { background:#555; color:#fff; }
    .bf-gray:hover { background:#333; }
    .bf-green { background:var(--green); color:#fff; }
    .bf-green:hover { background:#008843; }

    /* mode tabs */
    .mode-tabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
    .mode-tab {
      padding:8px 20px; border-radius:20px; border:2px solid #e0e0e0;
      background:#fff; font-weight:600; font-size:.85rem; cursor:pointer;
      transition:all .18s;
    }
    .mode-tab.active { background:var(--red); color:#fff; border-color:var(--red); }
    .mode-tab:hover:not(.active) { border-color:var(--red); color:var(--red); }

    /* counters */
    .count-row { display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
    .count-badge {
      display:flex; align-items:center; gap:8px;
      padding:10px 18px; border-radius:12px;
      font-weight:700; font-size:.92rem;
    }
    .cb-green { background:#e6f7ee; color:var(--green); }
    .cb-red   { background:#fdecea; color:var(--red); }
    .cb-amber { background:#fef7e6; color:var(--amber); }

    /* table */
    .table-card { background:#fff; border-radius:16px; padding:0; overflow:hidden; box-shadow:0 2px 14px rgba(0,0,0,.06); }
    table { width:100%; border-collapse:collapse; font-size:.87rem; }
    thead { background:var(--red); }
    thead th { color:#fff; padding:13px 14px; font-weight:700; font-size:.8rem; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
    tbody tr { border-bottom:1px solid #f0f0f0; transition:background .15s; }
    tbody tr:hover { background:#fafafa; }
    tbody td { padding:12px 14px; }
    .empty-cell { text-align:center; padding:36px; color:#999; }

    /* status pill */
    .sp { display:inline-block; padding:3px 11px; border-radius:20px; font-size:.75rem; font-weight:700; }
    .sp-present    { background:#e6f7ee; color:var(--green); }
    .sp-absent     { background:#fdecea; color:var(--red); }
    .sp-late       { background:#fef7e6; color:var(--amber); }
    .sp-permission { background:#e6eeff; color:var(--blue); }

    /* pagination */
    .pg-wrap { display:flex; justify-content:center; gap:8px; padding:20px; flex-wrap:wrap; }
    .pg-btn {
      width:36px; height:36px; border-radius:8px;
      border:1.5px solid #e0e0e0; background:#fff;
      font-weight:600; font-size:.85rem; cursor:pointer; transition:all .18s;
      display:flex; align-items:center; justify-content:center;
    }
    .pg-btn:hover { border-color:var(--red); color:var(--red); }
    .pg-btn.active { background:var(--red); color:#fff; border-color:var(--red); }
    .pg-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* override modal */
    .ov-modal {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.6); z-index:9000;
      align-items:center; justify-content:center; padding:20px;
    }
    .ov-modal.open { display:flex; }
    .ov-box {
      background:#fff; border-radius:18px; padding:28px 26px;
      width:100%; max-width:420px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      animation:ovIn .22s ease;
    }
    @keyframes ovIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
    .ov-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:18px; }
    .ov-field { margin-bottom:14px; }
    .ov-field label { display:block; font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:#888; margin-bottom:5px; }
    .ov-field select, .ov-field textarea {
      width:100%; padding:10px 13px; border:1.5px solid #e0e0e0; border-radius:10px;
      font-family:'DM Sans',sans-serif; font-size:.9rem;
    }
    .ov-field select:focus,.ov-field textarea:focus { outline:none; border-color:var(--red); }
    .ov-footer { display:flex; gap:10px; margin-top:18px; }
    .ov-btn {
      flex:1; padding:11px; border:none; border-radius:10px;
      font-family:'DM Sans',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer;
    }
    .ov-submit { background:var(--green); color:#fff; }
    .ov-submit:hover { background:#008843; }
    .ov-cancel { background:#eee; color:#333; }
    .ov-cancel:hover { background:#ddd; }

    /* toast */
    .toast-ct { position:fixed; bottom:24px; right:22px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast {
      background:#111; color:#fff; padding:13px 18px; border-radius:11px;
      font-size:.87rem; font-weight:500; max-width:300px;
      display:flex; align-items:center; gap:9px;
      animation:tUp .28s ease;
    }
    .t-success { background:var(--green); }
    .t-error   { background:var(--red); }
    .t-warn    { background:var(--amber); color:#111; }
    @keyframes tUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<nav class="topbar">
  <span class="topbar-brand"><i class="bi bi-shield-fill-check me-2"></i>NBC Admin — Attendance</span>
  <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
</nav>

<div class="main">
  <div class="page-title"><i class="bi bi-people-fill"></i> Staff Attendance Records</div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-day"   onclick="setMode('day')">Today</button>
    <button class="mode-tab"        id="tab-week"  onclick="setMode('week')">This Week</button>
    <button class="mode-tab"        id="tab-month" onclick="setMode('month')">Month Filter</button>
  </div>

  <!-- FILTER BAR (month mode only) -->
  <div class="filter-bar" id="month-filter-bar" style="display:none;">
    <div class="fg">
      <label>Month</label>
      <select id="monthSelect">
        <option value="1">January</option><option value="2">February</option>
        <option value="3">March</option><option value="4">April</option>
        <option value="5">May</option><option value="6">June</option>
        <option value="7">July</option><option value="8">August</option>
        <option value="9">September</option><option value="10">October</option>
        <option value="11">November</option><option value="12">December</option>
      </select>
    </div>
    <div class="fg">
      <label>Year</label>
      <select id="yearSelect">
        <option value="2024">2024</option>
        <option value="2025" selected>2025</option>
        <option value="2026">2026</option>
      </select>
    </div>
    <button class="btn-filter bf-red" onclick="applyMonthFilter()"><i class="bi bi-funnel-fill"></i> Apply</button>
    <button class="btn-filter bf-green" onclick="downloadExcel()"><i class="bi bi-file-earmark-excel"></i> Download Report</button>
  </div>

  <!-- Top toolbar for day/week -->
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px;" id="top-download">
    <button class="btn-filter bf-green" onclick="downloadExcel()"><i class="bi bi-file-earmark-excel"></i> Download Report</button>
  </div>

  <!-- COUNT BADGES -->
  <div class="count-row">
    <div class="count-badge cb-green"><i class="bi bi-check-circle-fill"></i> Present: <span id="presentCount">0</span></div>
    <div class="count-badge cb-red">  <i class="bi bi-x-circle-fill"></i>    Absent:  <span id="absentCount">0</span></div>
    <div class="count-badge cb-amber"><i class="bi bi-clock-fill"></i>        Late:    <span id="lateCount">0</span></div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div style="overflow-x:auto;">
      <table id="mainTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Office</th>
            <th>Check-In Time</th>
            <th>Check-Out Time</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="attendanceBody">
          <tr><td class="empty-cell" colspan="8">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pg-wrap" id="pagination"></div>
  </div>

</div>

<!-- OVERRIDE MODAL -->
<div class="ov-modal" id="overrideModal">
  <div class="ov-box">
    <div class="ov-title"><i class="bi bi-pencil-square" style="color:var(--amber);"></i> Override Attendance</div>
    <input type="hidden" id="overrideAttendanceId"/>
    <div class="ov-field">
      <label>Set Status To</label>
      <select id="overrideStatus">
        <option value="Present">✅ Mark as Present</option>
        <option value="Late">🕐 Mark as Late</option>
        <option value="Absent">❌ Mark as Absent</option>
      </select>
    </div>
    <div class="ov-field">
      <label>Reason for Override</label>
      <textarea id="overrideReason" rows="3" placeholder="Briefly explain the reason…"></textarea>
    </div>
    <div class="ov-footer">
      <button class="ov-btn ov-cancel" onclick="closeOverride()">Cancel</button>
      <button class="ov-btn ov-submit" onclick="submitOverride()">
        <i class="bi bi-check2-all"></i> Apply Override
      </button>
    </div>
  </div>
</div>

<div class="toast-ct" id="toastCt"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE  = 'https://nbc-boa-attendance-system.onrender.com';
const token = localStorage.getItem('token');
const hdrs  = { 'Content-Type':'application/json', 'Authorization':'Bearer '+token };

let mode   = 'day';
let page   = 1;
const limit = 15;
let totalPages  = 1;
let selectedMonth = new Date().getMonth() + 1;
let selectedYear  = new Date().getFullYear();

// pre-set month selector to current
document.getElementById('monthSelect').value = selectedMonth;
document.getElementById('yearSelect').value  = selectedYear;

// ── MODE ──
function setMode(m) {
  mode = m; page = 1;
  ['day','week','month'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('active', t===m));
  document.getElementById('month-filter-bar').style.display = m==='month' ? 'flex' : 'none';
  document.getElementById('top-download').style.display     = m!=='month' ? 'flex' : 'none';
  loadRecords();
}

function applyMonthFilter() {
  selectedMonth = document.getElementById('monthSelect').value;
  selectedYear  = document.getElementById('yearSelect').value;
  page = 1;
  loadRecords();
}

// ── LOAD ──
async function loadRecords() {
  document.getElementById('attendanceBody').innerHTML =
    '<tr><td class="empty-cell" colspan="8">Loading…</td></tr>';

  let url = `${BASE}/api/admin/present?mode=${mode}&page=${page}&limit=${limit}`;
  if (mode === 'month') url += `&month=${selectedMonth}&year=${selectedYear}`;

  try {
    const res  = await fetch(url, { headers: hdrs });
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();

    renderTable(data.records || []);
    renderPagination(data.page || 1, data.totalPages || 1);

    // counts
    document.getElementById('presentCount').textContent = data.presentCount ?? 0;
    document.getElementById('absentCount').textContent  = data.absentCount  ?? 0;
    document.getElementById('lateCount').textContent    = data.lateCount    ?? 0;

  } catch (e) {
    document.getElementById('attendanceBody').innerHTML =
      '<tr><td class="empty-cell" colspan="8" style="color:#e60012;">Error loading records. Please try again.</td></tr>';
  }
}

function renderTable(records) {
  const tbody = document.getElementById('attendanceBody');
  if (!records.length) {
    tbody.innerHTML = '<tr><td class="empty-cell" colspan="8">No records found for this period.</td></tr>';
    return;
  }

  tbody.innerHTML = records.map((r, i) => {
    const checkIn  = r.checkInTime ? new Date(r.checkInTime).toLocaleString('en-NG',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}) : '—';
    const checkOut = r.checkOutTime ? new Date(r.checkOutTime).toLocaleString('en-NG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true}) : '<span style="color:#bbb;">Not yet</span>';

    const sc = {Present:'sp-present',Absent:'sp-absent',Late:'sp-late',Permission:'sp-permission'}[r.status]||'';

    return `<tr>
      <td style="color:#aaa;">${((page-1)*limit)+i+1}</td>
      <td><strong>${r.name||'—'}</strong></td>
      <td style="color:#666;">${r.email||'—'}</td>
      <td>${r.office||'—'}</td>
      <td>${checkIn}</td>
      <td>${checkOut}</td>
      <td><span class="sp ${sc}">${r.status||'—'}</span></td>
      <td>
        <button class="btn-filter bf-gray" style="padding:5px 12px;font-size:.78rem;border-radius:7px;"
          onclick="openOverride('${r._id}','${r.status||''}')">
          <i class="bi bi-pencil"></i> Override
        </button>
      </td>
    </tr>`;
  }).join('');
}

// ── PAGINATION ──
function renderPagination(cur, total) {
  totalPages = total;
  const wrap = document.getElementById('pagination');
  if (total <= 1) { wrap.innerHTML=''; return; }

  let html = `<button class="pg-btn" onclick="changePage(${cur-1})" ${cur<=1?'disabled':''}><i class="bi bi-chevron-left"></i></button>`;

  let start = Math.max(1, cur-3), end = Math.min(total, start+6);
  start = Math.max(1, end-6);
  for (let p=start; p<=end; p++) {
    html += `<button class="pg-btn ${p===cur?'active':''}" onclick="changePage(${p})">${p}</button>`;
  }
  html += `<button class="pg-btn" onclick="changePage(${cur+1})" ${cur>=total?'disabled':''}><i class="bi bi-chevron-right"></i></button>`;
  wrap.innerHTML = html;
}

function changePage(p) { if (p<1||p>totalPages) return; page=p; loadRecords(); }

// ── OVERRIDE ──
function openOverride(id, currentStatus) {
  document.getElementById('overrideAttendanceId').value = id;
  document.getElementById('overrideStatus').value = currentStatus || 'Present';
  document.getElementById('overrideReason').value = '';
  document.getElementById('overrideModal').classList.add('open');
}
function closeOverride() {
  document.getElementById('overrideModal').classList.remove('open');
}

async function submitOverride() {
  const attendanceId = document.getElementById('overrideAttendanceId').value;
  const status       = document.getElementById('overrideStatus').value;
  const reason       = document.getElementById('overrideReason').value.trim();

  if (!reason) { showToast('Please enter a reason for the override.', 'warn'); return; }

  try {
    const res  = await fetch(`${BASE}/api/admin/override/${attendanceId}`, {
      method:'PUT', headers: hdrs,
      body: JSON.stringify({ status, reason })
    });
    const data = await res.json();

    if (res.ok) {
      showToast(data.message || '✅ Override applied successfully.', 'success');
      closeOverride();
      loadRecords();
    } else {
      showToast(data.message || '❌ Override failed.', 'error');
    }
  } catch {
    showToast('Network error. Please try again.', 'error');
  }
}

// ── DOWNLOAD EXCEL ──
function downloadExcel() {
  const table = document.getElementById('mainTable');
  const wb    = XLSX.utils.table_to_book(table, { sheet: 'Attendance' });
  const label = mode==='month' ? `${document.getElementById('monthSelect').options[selectedMonth-1].text}_${selectedYear}` : mode;
  XLSX.writeFile(wb, `NBC_Attendance_${label}.xlsx`);
}

// ── TOAST ──
function showToast(msg, type='') {
  const c=document.getElementById('toastCt'), d=document.createElement('div');
  d.className=`toast t-${type}`;
  d.innerHTML=`<span>${type==='success'?'✅':type==='error'?'❌':'⚠️'}</span>${msg}`;
  c.appendChild(d); setTimeout(()=>d.remove(),4500);
}

function logout() { localStorage.clear(); window.location.href='/admin-login'; }

// Close override modal when clicking outside
document.getElementById('overrideModal').addEventListener('click', function(e) {
  if (e.target === this) closeOverride();
});

window.onload = loadRecords;
</script>
</body>
</html>
